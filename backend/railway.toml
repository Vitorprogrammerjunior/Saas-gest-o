[build]
builder = "NIXPACKS"
buildCommand = "composer install --no-dev --optimize-autoloader && cd ../frontend && npm install && npm run build && cp -r dist/* ../backend/public/"

[deploy]
startCommand = "mkdir -p database storage/framework/{sessions,views,cache/data} storage/logs bootstrap/cache && touch database/database.sqlite && php artisan key:generate --force && php artisan migrate:fresh --seed --force && php artisan serve --host=0.0.0.0 --port=${PORT:-8000}"
