[phases.setup]
nixPkgs = ["php83", "php83Packages.composer", "nodejs_20", "nodePackages.npm"]

[phases.build]
cmds = [
  "cd frontend && npm install && npm run build && cp -r dist/* ../backend/public/",
  "cd backend && composer install --no-dev --optimize-autoloader"
]

[start]
cmd = "cd backend && mkdir -p database storage/framework/{sessions,views,cache/data} storage/logs bootstrap/cache && touch database/database.sqlite && php artisan key:generate --force && php artisan migrate:fresh --seed --force && php artisan serve --host=0.0.0.0 --port=${PORT:-8000}"
